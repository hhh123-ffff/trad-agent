name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: 后端与前端检查
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qrant
          POSTGRES_PASSWORD: qrant_dev
          POSTGRES_DB: qrant_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qrant -d qrant_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://qrant:qrant_dev@127.0.0.1:5432/qrant_agent
      REDIS_URL: redis://127.0.0.1:6379/0
      MARKETLENS_MARKET_PROVIDER: free
      MARKETLENS_HISTORY_PROVIDER: akshare
      MARKETLENS_INFO_PROVIDER: akshare
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: 安装 Python 依赖
        run: python -m pip install -r backend/requirements.lock

      - name: 安装 Node 依赖
        run: npm ci

      - name: 执行数据库迁移
        run: python -m backend.app.migrations

      - name: 运行后端测试
        run: python -m pytest backend/tests -q

      - name: 编译 Python 模块
        run: python -m compileall -q backend tools

      - name: 构建前端
        run: npm run build
