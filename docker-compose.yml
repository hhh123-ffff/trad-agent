services:
  postgres:
    image: postgres:16
    container_name: qrant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qrant
      POSTGRES_PASSWORD: qrant_dev
      POSTGRES_DB: qrant_agent
    ports:
      - "5432:5432"
    volumes:
      - qrant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrant -d qrant_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: qrant-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - qrant_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  qrant_postgres_data:
  qrant_redis_data:
